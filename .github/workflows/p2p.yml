name: Binance P2P → Telegram
 
on:
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r binance-p2p-bot/requirements.txt
      - run: python binance-p2p-bot/bot.py --once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Guardar historial
        run: |
          git config user.name "p2p-bot"
          git config user.email "p2p-bot@users.noreply.github.com"
          git add data/history.csv
          git diff --cached --quiet && exit 0
          git commit -m "historial $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
